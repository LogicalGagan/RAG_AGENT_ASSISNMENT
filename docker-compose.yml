services:
  backend:
    build:
      context: ./backend
    container_name: multimodal-rag-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: multimodal-rag-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    restart: unless-stopped
